services:
  - type: worker
    name: ai-lawsuit-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python monitor.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DB_PATH
        value: /tmp/lawsuits.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
